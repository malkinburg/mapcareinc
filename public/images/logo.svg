<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4AABB8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Stylized hands cradling a heart / map pin shape -->
  <g transform="translate(20, 10)">
    <!-- Left hand arc -->
    <path d="M 15 70 Q 5 45, 30 30 Q 40 24, 45 28" fill="none" stroke="#2E7D8C" stroke-width="4" stroke-linecap="round"/>
    <!-- Right hand arc -->
    <path d="M 75 70 Q 85 45, 60 30 Q 50 24, 45 28" fill="none" stroke="#2E7D8C" stroke-width="4" stroke-linecap="round"/>

    <!-- Heart / map-pin hybrid -->
    <path d="M 45 25 C 35 10, 15 18, 25 35 C 30 45, 45 60, 45 60 C 45 60, 60 45, 65 35 C 75 18, 55 10, 45 25 Z"
          fill="url(#heartGrad)" opacity="0.9"/>
    <!-- Small circle inside (map pin dot) -->
    <circle cx="45" cy="35" r="6" fill="white" opacity="0.85"/>

    <!-- People silhouettes at base -->
    <!-- Adult -->
    <circle cx="35" cy="78" r="4" fill="#F4A261"/>
    <path d="M 35 82 L 35 95 M 29 88 L 41 88 M 35 95 L 29 105 M 35 95 L 41 105" stroke="#F4A261" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Child -->
    <circle cx="55" cy="83" r="3.5" fill="#E07A5F"/>
    <path d="M 55 86.5 L 55 97 M 50 91 L 60 91 M 55 97 L 50 105 M 55 97 L 60 105" stroke="#E07A5F" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="120" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="#1B3A4B" letter-spacing="1">
    Mapcare
  </text>
  <text x="120" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" fill="#5A8A97" letter-spacing="3">
    STAFFING &amp; SUPPORT
  </text>

  <!-- Subtle underline accent -->
  <line x1="120" y1="90" x2="280" y2="90" stroke="#F4A261" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
